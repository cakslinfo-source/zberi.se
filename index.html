<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Zberi se — najdi soigralce</title>
<meta name="description" content="Zberi se — najdi soigralce za kolo, golf, tek in vse ostalo. Odpri dogodek in pridružijo se ti.">
<meta name="theme-color" content="#1b4f95">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Zberi se">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    color-scheme: light;
    --surface-1:#fcfcfb;
    --plane:#f9f9f7;
    --card:#ffffff;
    --text-primary:#0b0b0b;
    --text-secondary:#52514e;
    --muted:#898781;
    --grid:#e1e0d9;
    --baseline:#c3c2b7;
    --border:rgba(11,11,11,0.10);
    --brand:#2a78d6;
    --brand-dark:#184f95;
    --brand-soft:#eaf2fd;
    --good:#0ca30c;
    --warning:#fab219;
    --critical:#d03b3b;
    /* categorical slots for chart */
    --s1:#2a78d6;--s2:#008300;--s3:#e87ba4;--s4:#eda100;--s5:#1baf7a;--s6:#eb6834;--s7:#4a3aa7;--s8:#e34948;
    --radius:18px;
    --shadow:0 1px 3px rgba(11,11,11,.06),0 8px 24px rgba(11,11,11,.05);
    --font:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%}
  body{
    font-family:var(--font);
    background:#e9e9e6;
    color:var(--text-primary);
    display:flex;justify-content:center;
    min-height:100vh;
    overflow:hidden;
  }
  /* phone frame */
  #phone{
    width:100%;
    max-width:430px;
    background:var(--plane);
    height:100vh;
    height:100dvh;
    position:relative;
    display:flex;flex-direction:column;
    box-shadow:0 0 60px rgba(0,0,0,.15);
    overflow:hidden;
  }
  @media(min-width:460px){
    body{align-items:center;padding:24px 0;overflow:auto}
    #phone{min-height:calc(100vh - 48px);height:900px;border-radius:38px;border:10px solid #111;overflow:hidden}
  }
  #app{flex:1;min-height:0;display:flex;flex-direction:column}
  .screen{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(96px + env(safe-area-inset-bottom))}
  .hidden{display:none!important}
  button{font-family:var(--font);cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:var(--font);font-size:16px}

  /* ---------- AUTH ---------- */
  #auth{display:flex;flex-direction:column;justify-content:center;
    padding:calc(32px + env(safe-area-inset-top)) 26px calc(32px + env(safe-area-inset-bottom));
    height:100vh;height:100dvh;overflow-y:auto;background:
    radial-gradient(120% 60% at 50% 0%, #2a78d6 0%, #1b4f95 55%, #12356b 100%);color:#fff}
  .logo{font-size:40px;font-weight:800;letter-spacing:-1px;display:flex;align-items:center;gap:10px}
  .logo .dot{width:14px;height:14px;border-radius:50%;background:#eda100;box-shadow:0 0 0 5px rgba(237,161,0,.25)}
  .tagline{opacity:.85;margin:8px 0 34px;font-size:15px;line-height:1.5}
  .auth-card{background:rgba(255,255,255,.10);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.18);
    border-radius:22px;padding:22px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12.5px;font-weight:600;margin-bottom:6px;opacity:.9;text-transform:uppercase;letter-spacing:.4px}
  .field input{width:100%;padding:13px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.25);
    background:rgba(255,255,255,.14);color:#fff;outline:none}
  .field input::placeholder{color:rgba(255,255,255,.6)}
  .field input:focus{border-color:#eda100;background:rgba(255,255,255,.2)}
  .btn-primary{width:100%;padding:14px;border-radius:12px;background:#eda100;color:#3a2600;font-weight:800;font-size:16px;
    box-shadow:0 6px 16px rgba(237,161,0,.35);transition:transform .05s}
  .btn-primary:active{transform:scale(.98)}
  .switch-auth{text-align:center;margin-top:16px;font-size:14px;opacity:.9}
  .switch-auth b{color:#eda100;cursor:pointer}
  .forgot{text-align:center;margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.15);font-size:12.5px;opacity:.8;line-height:1.5}
  .forgot b{color:#eda100}
  .auth-err{background:rgba(208,59,59,.9);color:#fff;padding:10px 12px;border-radius:10px;font-size:13.5px;margin-bottom:14px;display:none}
  .hint{font-size:12px;opacity:.7;margin-top:18px;text-align:center;line-height:1.5}

  /* ---------- TOPBAR ---------- */
  .topbar{position:sticky;top:0;z-index:20;background:var(--surface-1);
    padding:calc(14px + env(safe-area-inset-top)) 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
  .topbar h1{font-size:20px;margin:0;font-weight:800;letter-spacing:-.5px;flex:1}
  .topbar .sub{font-size:12.5px;color:var(--muted);font-weight:500}
  .av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:15px;flex-shrink:0}

  /* ---------- CHIPS (sport filter) ---------- */
  .chips{display:flex;gap:8px;overflow-x:auto;padding:12px 18px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{white-space:nowrap;padding:8px 14px;border-radius:999px;background:var(--card);border:1px solid var(--border);
    font-size:13.5px;font-weight:600;color:var(--text-secondary);display:flex;align-items:center;gap:6px}
  .chip.active{background:var(--brand);color:#fff;border-color:var(--brand)}

  /* ---------- EVENT CARD ---------- */
  .list{padding:4px 16px 20px}
  .day-head{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;
    margin:16px 4px 8px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:15px;margin-bottom:12px;
    box-shadow:var(--shadow);position:relative;overflow:hidden}
  .card:active{transform:scale(.995)}
  .card-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .sport-ic{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
  .card-title{font-weight:700;font-size:16px;line-height:1.2}
  .card-sport{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:2px}
  .card-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px 10px;font-size:13px;color:var(--text-secondary)}
  .card-meta div{display:flex;align-items:center;gap:6px}
  .card-meta svg{flex-shrink:0;opacity:.7}
  .card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:13px;padding-top:12px;border-top:1px solid var(--border)}
  .avatars{display:flex}
  .avatars .av{width:28px;height:28px;font-size:11px;margin-left:-8px;border:2px solid var(--card)}
  .avatars .av:first-child{margin-left:0}
  .slots{font-size:12.5px;color:var(--text-secondary);font-weight:600}
  .badge-full{background:#e7f6e7;color:#0a7a0a;font-size:11.5px;font-weight:800;padding:4px 9px;border-radius:8px;letter-spacing:.3px}
  .badge-open{background:var(--brand-soft);color:var(--brand-dark);font-size:11.5px;font-weight:800;padding:4px 9px;border-radius:8px}
  .badge-done{background:#eef0f2;color:#6b6f76;font-size:10.5px;font-weight:800;padding:4px 9px;border-radius:8px;flex-shrink:0}
  .past-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:11px 13px;margin-bottom:10px;
    display:flex;align-items:center;gap:11px;opacity:.82}
  .past-card:active{transform:scale(.99)}
  .mine-tag{position:absolute;top:0;right:0;background:var(--brand);color:#fff;font-size:10.5px;font-weight:800;
    padding:4px 10px;border-bottom-left-radius:12px;letter-spacing:.4px}
  .progress{height:6px;background:var(--grid);border-radius:99px;margin-top:12px;overflow:hidden}
  .progress i{display:block;height:100%;background:var(--brand);border-radius:99px}
  .progress i.full{background:var(--good)}

  .empty{text-align:center;color:var(--muted);padding:60px 30px;font-size:14.5px;line-height:1.6}
  .empty .big{font-size:40px;margin-bottom:10px}

  /* ---------- BOTTOM NAV ---------- */
  .nav{position:absolute;bottom:0;left:0;right:0;background:var(--surface-1);border-top:1px solid var(--border);
    display:flex;padding:8px 6px calc(8px + env(safe-area-inset-bottom));z-index:30}
  .nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:11px;font-weight:600;padding:4px 0}
  .nav button.active{color:var(--brand)}
  .nav svg{width:23px;height:23px}
  .fab-wrap{flex:1;display:flex;justify-content:center;position:relative}
  .fab{position:absolute;top:-26px;width:56px;height:56px;border-radius:50%;background:var(--brand);color:#fff;
    display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(42,120,214,.45);font-size:30px;font-weight:300}
  .fab:active{transform:scale(.94)}

  /* ---------- FORM (create/edit) ---------- */
  .form-wrap{padding:8px 18px 30px}
  .form-group{margin-bottom:16px}
  .form-group label{display:block;font-size:13px;font-weight:700;margin-bottom:7px;color:var(--text-primary)}
  .form-group input,.form-group select,.form-group textarea{width:100%;padding:13px 14px;border-radius:12px;
    border:1px solid var(--border);background:var(--card);color:var(--text-primary);outline:none}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
  .sport-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .sport-pick{border:1px solid var(--border);border-radius:14px;padding:10px 4px;display:flex;flex-direction:column;
    align-items:center;gap:5px;background:var(--card);font-size:10.5px;font-weight:600;color:var(--text-secondary);text-align:center;line-height:1.15}
  .sport-pick .ic{font-size:23px}
  .sport-pick.active{border-color:var(--brand);background:var(--brand-soft);color:var(--brand-dark)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .stepper{display:flex;align-items:center;gap:0;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--card)}
  .stepper button{width:48px;height:48px;font-size:22px;color:var(--brand);font-weight:700}
  .stepper input{border:none!important;text-align:center;box-shadow:none!important;font-weight:800;font-size:18px}
  .save-bar{padding:14px 18px calc(16px + env(safe-area-inset-bottom));background:var(--surface-1);border-top:1px solid var(--border)}

  /* ---------- DETAIL SHEET ---------- */
  .sheet-back{position:fixed;inset:0;background:rgba(11,11,11,.45);z-index:50;display:flex;align-items:flex-end;justify-content:center}
  .sheet{background:var(--surface-1);width:100%;max-width:430px;max-height:90vh;max-height:90dvh;border-radius:24px 24px 0 0;overflow-y:auto;
    -webkit-overflow-scrolling:touch;overscroll-behavior:contain;animation:slideup .28s ease}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .sheet-handle{width:42px;height:5px;border-radius:99px;background:var(--baseline);margin:10px auto 4px}
  .sheet-hero{padding:20px 22px;color:#fff;position:relative}
  .sheet-hero h2{margin:0;font-size:23px;font-weight:800;letter-spacing:-.5px}
  .sheet-hero .sp{font-size:14px;opacity:.9;font-weight:600;margin-top:4px;display:flex;align-items:center;gap:7px}
  .sheet-body{padding:20px 22px 24px}
  .detail-row{display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid var(--border)}
  .detail-row .di{width:40px;height:40px;border-radius:12px;background:var(--brand-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .detail-row .dl{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
  .detail-row .dv{font-size:15.5px;font-weight:600;margin-top:1px}
  .parts{margin:18px 0}
  .parts h4{font-size:13px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin:0 0 12px}
  .part{display:flex;align-items:center;gap:11px;margin-bottom:11px}
  .part .name{font-weight:600;font-size:14.5px}
  .part .who{font-size:12px;color:var(--muted)}
  .host-b{margin-left:auto;font-size:10.5px;font-weight:800;background:#fff4dc;color:#8a5a00;padding:3px 8px;border-radius:7px}
  .join-btn{width:100%;padding:15px;border-radius:14px;font-weight:800;font-size:16px;margin-top:6px;transition:transform .05s}
  .join-btn:active{transform:scale(.98)}
  .join-yes{background:var(--brand);color:#fff}
  .join-leave{background:#fdeaea;color:var(--critical)}
  .join-full{background:var(--grid);color:var(--muted)}
  .sheet-admin{display:flex;gap:10px;margin-top:12px}
  .sheet-admin button{flex:1;padding:12px;border-radius:12px;font-weight:700;font-size:14px;border:1px solid var(--border);background:var(--card)}
  .sheet-admin .del{color:var(--critical);border-color:#f3cccc}
  .sheet-share{position:absolute;top:16px;right:16px;width:38px;height:38px;border-radius:50%;
    background:rgba(255,255,255,.22);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
  .sheet-share:active{transform:scale(.92)}
  .mini-nav{margin-left:auto;flex-shrink:0;background:var(--brand-soft);color:var(--brand-dark);font-weight:700;
    font-size:12.5px;padding:8px 11px;border-radius:10px;align-self:center}
  .mini-nav:active{transform:scale(.96)}
  /* raven / težavnost */
  .lvl-pill{display:inline-block;font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:6px;letter-spacing:.2px;vertical-align:middle}
  .lvl-vsi{background:#f0eefb;color:#4a3aa7}
  .lvl-zac{background:#e7f6e7;color:#0a7a0a}
  .lvl-rek{background:#eaf2fd;color:#184f95}
  .lvl-nap{background:#fdeaea;color:#c0392b}
  .sheet-hero .lvl-pill{background:rgba(255,255,255,.25);color:#fff}
  /* vreme */
  .wx{display:flex;align-items:center;gap:13px;background:var(--brand-soft);border:1px solid #d7e6fa;border-radius:14px;padding:12px 14px;margin:15px 0 4px}
  .wx .t{font-size:26px;line-height:1}
  .wx .temp{font-weight:800;font-size:18px}
  .wx .muted{color:var(--muted);font-size:12.5px;margin-top:1px}
  /* klepet */
  .chat{margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
  .chat h4{font-size:13px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin:0 0 12px}
  .msg{display:flex;gap:9px;margin-bottom:11px;align-items:flex-start}
  .msg.me{flex-direction:row-reverse}
  .msg .b{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:8px 12px;max-width:78%}
  .msg.me .b{background:var(--brand);color:#fff;border-color:var(--brand)}
  .msg .mn{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:2px}
  .msg .mt{font-size:14.5px;line-height:1.35;word-break:break-word}
  .msg .mtime{font-size:10px;opacity:.55;margin-top:3px;text-align:right}
  .chat-input{display:flex;gap:8px;margin-top:8px}
  .chat-input input{flex:1;padding:12px 13px;border-radius:12px;border:1px solid var(--border);background:var(--card);outline:none}
  .chat-input input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
  .chat-input button{background:var(--brand);color:#fff;border-radius:12px;padding:0 16px;font-weight:700;font-size:14px}
  .chat-lock{text-align:center;background:var(--plane);border:1px dashed var(--baseline);border-radius:14px;padding:22px 18px}
  .chat-lock .lk-ic{font-size:30px;margin-bottom:6px}
  .chat-lock .lk-t{font-weight:700;font-size:14.5px}
  .chat-lock .lk-s{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.5}
  /* modal (ponastavitev gesla) */
  .modal{background:var(--surface-1);width:calc(100% - 48px);max-width:360px;border-radius:20px;padding:24px 22px;text-align:center;animation:slideup .22s ease}
  .modal-ic{font-size:34px}
  .modal h3{margin:6px 0 6px;font-size:19px;font-weight:800}
  .modal p{margin:0 0 16px;font-size:14px;color:var(--text-secondary);line-height:1.5}
  .modal .muted-e{color:var(--muted);font-size:12.5px}
  .modal input{width:100%;padding:13px 14px;border-radius:12px;border:1px solid var(--border);background:var(--card);outline:none;margin-bottom:16px}
  .modal input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
  .modal-btns{display:flex;gap:10px}
  .modal-btns button{flex:1;padding:13px;border-radius:12px;font-weight:700;font-size:15px}
  .mb-cancel{background:var(--plane);color:var(--text-secondary);border:1px solid var(--border)}
  .mb-save{background:var(--brand);color:#fff}

  /* ---------- ADMIN ---------- */
  .kpi-row{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:4px 16px 8px}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:15px;box-shadow:var(--shadow)}
  .kpi .v{font-size:28px;font-weight:800;letter-spacing:-1px}
  .kpi .l{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:2px}
  .kpi.hl{background:linear-gradient(135deg,#2a78d6,#1b4f95);color:#fff;border:none}
  .kpi.hl .l{color:rgba(255,255,255,.85)}
  .kpi.gold{background:linear-gradient(135deg,#eda100,#e07b00);color:#fff;border:none}
  .kpi.gold .l{color:rgba(255,255,255,.9)}
  .panel{background:var(--card);border:1px solid var(--border);border-radius:18px;margin:12px 16px;padding:16px;box-shadow:var(--shadow)}
  .panel h3{margin:0 0 3px;font-size:15px;font-weight:800}
  .panel .psub{font-size:12.5px;color:var(--muted);margin-bottom:14px}
  .seg{display:flex;background:var(--plane);border:1px solid var(--border);border-radius:10px;padding:3px;margin-bottom:16px}
  .seg button{flex:1;padding:8px;border-radius:8px;font-size:12.5px;font-weight:700;color:var(--muted)}
  .seg button.active{background:var(--card);color:var(--text-primary);box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:11px}
  .bar-row .bl{width:96px;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:6px;flex-shrink:0}
  .bar-row .bl .e{font-size:15px}
  .bar-track{flex:1;height:22px;background:var(--plane);border-radius:7px;overflow:hidden;position:relative}
  .bar-track i{display:block;height:100%;border-radius:7px;min-width:3px;transition:width .5s cubic-bezier(.2,.8,.2,1)}
  .bar-val{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11.5px;font-weight:800;color:var(--text-secondary)}
  .admin-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
  .admin-item:last-child{border-bottom:none}
  .admin-item .ai-ic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
  .admin-item .ai-t{font-weight:700;font-size:14px}
  .admin-item .ai-s{font-size:12px;color:var(--muted)}
  .admin-item .ai-edit{margin-left:auto;color:var(--brand);font-weight:700;font-size:13px;padding:6px 10px;background:var(--brand-soft);border-radius:9px}

  /* profile */
  .prof-head{display:flex;flex-direction:column;align-items:center;padding:26px 20px 10px}
  .prof-head .av{width:78px;height:78px;font-size:30px;margin-bottom:12px}
  .prof-head .pn{font-size:21px;font-weight:800}
  .prof-head .pe{font-size:13.5px;color:var(--muted)}
  .prof-stats{display:flex;gap:12px;padding:14px 16px}
  .prof-stats .ps{flex:1;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center}
  .prof-stats .ps .v{font-size:22px;font-weight:800}
  .prof-stats .ps .l{font-size:11.5px;color:var(--muted);font-weight:600}
  .logout{margin:20px 16px;width:calc(100% - 32px);padding:14px;border-radius:12px;background:#fdeaea;color:var(--critical);font-weight:700}
  .toast{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:11px 18px;

  const [pr,ev,pa,ms]=await Promise.all([

    location:e.location,date:e.event_date,time:e.event_time,duration:e.duration,level:e.level||"Vsi nivoji",
    notes:e.notes||"",parts:[],waitlist:[],messages:[]}));
  const emap={}; events.forEach(e=>emap[e.id]=e);

let rtChannel=null,rtT=null;
function subscribeRealtime(){
  if(rtChannel||!sb) return;
  rtChannel=sb.channel("zberi-rt")
    .on("postgres_changes",{event:"*",schema:"public",table:"events"},onRt)
    .on("postgres_changes",{event:"*",schema:"public",table:"participants"},onRt)
    .on("postgres_changes",{event:"*",schema:"public",table:"messages"},onRt)
    .subscribe();
}
function onRt(){ clearTimeout(rtT); rtT=setTimeout(async()=>{ try{ await loadAll(); rerenderCurrent(); }catch(e){} },350); }
function unsubscribeRealtime(){ if(rtChannel&&sb){ sb.removeChannel(rtChannel); rtChannel=null; } }

/* ================= AUTH ================= */
let authMode = "register"; // or login
function toggleAuth(){
  authMode = authMode==="register" ? "login" : "register";
  document.getElementById("regName").classList.toggle("hidden", authMode==="login");
  document.getElementById("authBtn").textContent = authMode==="login" ? "Prijava" : "Ustvari račun";
  document.getElementById("switchAuth").innerHTML = authMode==="login"
    ? 'Nimaš računa? <b onclick="toggleAuth()">Registracija</b>'
    : 'Že imaš račun? <b onclick="toggleAuth()">Prijava</b>';
  document.getElementById("authErr").style.display="none";
}
function authError(msg){const e=document.getElementById("authErr");e.textContent=msg;e.style.display="block"}
function authBusy(b){ const btn=document.getElementById("authBtn"); if(!btn)return; btn.disabled=b; btn.style.opacity=b?.6:1;
  btn.textContent=b?"Prosim počakaj ...":(authMode==="login"?"Prijava":"Ustvari račun"); }
function prettyErr(e){ const m=(e&&e.message)||""; if(/already|exists|registered/i.test(m)) return "Ta e-pošta je že registrirana. Prijavi se.";
  if(/password/i.test(m)) return "Geslo mora imeti vsaj 6 znakov."; return m||"Napaka pri registraciji."; }
async function submitAuth(){
  if(!sb) return authError("Ni povezave z bazo. Osveži stran in poskusi znova.");
  const name=document.getElementById("fName").value.trim();
  const email=document.getElementById("fEmail").value.trim().toLowerCase();
  const pass=document.getElementById("fPass").value;
  if(!email||!pass) return authError("Vnesi e-pošto in geslo.");
  if(authMode==="register" && !name) return authError("Vnesi svoje ime.");
  document.getElementById("authErr").style.display="none";
  authBusy(true);
  try{
    if(authMode==="register"){
      const {data,error}=await sb.auth.signUp({email,password:pass,options:{data:{name}}});
      if(error){ authError(prettyErr(error)); return; }
      if(data.user){ try{ await sb.from("profiles").upsert({id:data.user.id,name,email}); }catch(e){} }
      if(!data.session){ authError("Račun ustvarjen. Preveri e-pošto za potrditev, nato se prijavi."); return; }
      await afterLogin();
    } else {
      const {error}=await sb.auth.signInWithPassword({email,password:pass});
      if(error){ authError("Napačna e-pošta ali geslo."); return; }
      await afterLogin();
    }
  }catch(err){ authError("Napaka pri povezavi z bazo."); }
  finally{ authBusy(false); }
}
async function afterLogin(){
  const {data:{user}}=await sb.auth.getUser();
  if(!user){ authError("Prijava ni uspela."); return; }
  await ensureProfile(user);
  await loadAll();
  me = users.find(u=>u.id===user.id) || {id:user.id,name:(user.user_metadata&&user.user_metadata.name)||user.email,email:user.email,isAdmin:false};
  subscribeRealtime();
  enterApp();
}
async function ensureProfile(user){
  try{ const {data}=await sb.from("profiles").select("id").eq("id",user.id).maybeSingle();
    if(!data){ const nm=(user.user_metadata&&user.user_metadata.name)||user.email;
      await sb.from("profiles").upsert({id:user.id,name:nm,email:user.email}); }
  }catch(e){}
}
function enterApp(){
  document.getElementById("auth").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  document.getElementById("navAdmin").style.display = me.isAdmin ? "flex" : "none";
  go("home");
}
async function logout(){
  try{ await sb.auth.signOut(); }catch(e){}
  me=null; openId=null; unsubscribeRealtime();
  document.getElementById("app").classList.add("hidden");
  document.getElementById("auth").classList.remove("hidden");
  document.getElementById("fName").value="";document.getElementById("fEmail").value="";document.getElementById("fPass").value="";
}

}
function fmtDay(iso){
  const d=new Date(iso+"T00:00:00"); const t=new Date(); t.setHours(0,0,0,0);
  const diff=Math.round((d-t)/86400000);
  const days=["nedelja","ponedeljek","torek","sreda","četrtek","petek","sobota"];
  const label = diff===0?"Danes":diff===1?"Jutri":days[d.getDay()].charAt(0).toUpperCase()+days[d.getDay()].slice(1);
  return {label, date:`${d.getDate()}.${d.getMonth()+1}.`, sortKey:iso, diff};
}
function svgIcon(type){
  const p={
    pin:'<circle cx="12" cy="10" r="3"/><path d="M12 21c-4-4.5-7-7.5-7-11a7 7 0 0114 0c0 3.5-3 6.5-7 11z"/>',

function renderHome(){
  const upcoming = events.filter(e=> (filterSport==="all"||e.sport===filterSport) && !isPast(e))
    .sort((a,b)=> a.date===b.date ? a.time.localeCompare(b.time) : a.date.localeCompare(b.date));

  let chips = `<button class="chip ${filterSport==='all'?'active':''}" onclick="setFilter('all')">Vse</button>`;
  SPORTS.forEach(s=>{ chips += `<button class="chip ${filterSport===s.id?'active':''}" onclick="setFilter('${s.id}')"><span>${s.emoji}</span>${s.name}</button>`; });

  let body="";
  if(upcoming.length===0){
    body=`<div class="empty"><div class="big">🔍</div>Ni dogodkov za ta šport.<br>Bodi prvi in ustvari dogodek!</div>`;
  } else {
    let lastDay=null;
    upcoming.forEach(e=>{
      const d=fmtDay(e.date);
      if(d.sortKey!==lastDay){ body+=`<div class="day-head">${d.label} · ${d.date}</div>`; lastDay=d.sortKey; }
      body+=eventCard(e);
    });
  }
  document.getElementById("screen").innerHTML = `
    <div class="topbar">
      <div style="flex:1">
        <h1>Odkrij dogodke</h1>
        <div class="sub">Pridruži se ali odpri svojega</div>

      ${avatarHTML(me.id)}
    </div>
    <div class="chips">${chips}</div>
    <div class="list">${body}</div>`;
}

function eventCard(e){
  const s=sportById(e.sport);

/* ================= MY EVENTS ================= */
function renderMine(){
  const all=events.filter(e=>e.parts.includes(me.id));
  const upcoming=all.filter(e=>!isPast(e))
    .sort((a,b)=> a.date===b.date ? a.time.localeCompare(b.time) : a.date.localeCompare(b.date));
  const done=all.filter(e=>isPast(e))
    .sort((a,b)=> a.date===b.date ? b.time.localeCompare(a.time) : b.date.localeCompare(a.date));
  const hosted=events.filter(e=>e.hostId===me.id).length;

  let body="";
  if(upcoming.length===0){
    body=`<div class="empty"><div class="big">📭</div>Nimaš prihajajočih dogodkov.<br>Poišči ga na Domov ali ustvari svojega.</div>`;
  } else {
    let lastDay=null;
    upcoming.forEach(e=>{const d=fmtDay(e.date);
      if(d.sortKey!==lastDay){body+=`<div class="day-head">${d.label} · ${d.date}</div>`;lastDay=d.sortKey;}

function closeSheet(){document.getElementById("sheetHost").innerHTML="";openId=null;}
function shade(hex){ // darken a hex ~22%
  const n=parseInt(hex.slice(1),16);let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=Math.round(r*.7);g=Math.round(g*.7);b=Math.round(b*.7);
  return "#"+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

/* ============ KOLEDAR (.ics) ============
   Standard iCalendar deluje na iOS (Apple Koledar) in Android (Google Koledar).
   V spakirani aplikaciji (Capacitor) se to zamenja z native koledar-vtičnikom,
   ki vpis doda neposredno brez prenosa datoteke. */
function pad2(n){return String(n).padStart(2,"0")}
function icsEscape(s){return (s||"").replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/\n/g,"\\n")}
function durationToMin(d){
  if(d==="cel dan") return 480;
  let m=0; const h=d.match(/(\d+)\s*h/); const mm=d.match(/(\d+)\s*min/);
  if(h) m+=parseInt(h[1])*60; if(mm) m+=parseInt(mm[1]); return m||60;
}
function icsStart(dateISO,timeHHMM){return dateISO.replace(/-/g,"")+"T"+timeHHMM.replace(":","")+"00"}
function icsEnd(dateISO,timeHHMM,mins){
  const [Y,M,D]=dateISO.split("-").map(Number); const [hh,mi]=timeHHMM.split(":").map(Number);
  const dt=new Date(Y,M-1,D,hh,mi); dt.setMinutes(dt.getMinutes()+mins);
  return `${dt.getFullYear()}${pad2(dt.getMonth()+1)}${pad2(dt.getDate())}T${pad2(dt.getHours())}${pad2(dt.getMinutes())}00`;
}
function icsStamp(){const d=new Date();
  return `${d.getUTCFullYear()}${pad2(d.getUTCMonth()+1)}${pad2(d.getUTCDate())}T${pad2(d.getUTCHours())}${pad2(d.getUTCMinutes())}${pad2(d.getUTCSeconds())}Z`;}
function buildICS(e){
  const s=sportById(e.sport); const mins=durationToMin(e.duration);
  let desc=`Zberi se — ${s.name}. Potrebnih oseb: ${e.needed}.`;
  if(e.notes) desc+="\n\n"+e.notes;
  desc+="\n\nZbirno mesto: "+e.location+"\nOrganizirano prek aplikacije Zberi se.";
  return [
    "BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Zberi se//Sportna aplikacija//SL","CALSCALE:GREGORIAN","METHOD:PUBLISH",
    "BEGIN:VEVENT",
    "UID:zberise-"+e.id+"-"+me.id+"@zberise.si",
    "DTSTAMP:"+icsStamp(),
    "DTSTART:"+icsStart(e.date,e.time),
    "DTEND:"+icsEnd(e.date,e.time,mins),
    "SUMMARY:"+icsEscape(s.emoji+" "+e.title),
    "LOCATION:"+icsEscape(e.location),
    "DESCRIPTION:"+icsEscape(desc),
    "BEGIN:VALARM","ACTION:DISPLAY","DESCRIPTION:"+icsEscape("Opomnik: "+e.title+" (čez 1 uro)"),"TRIGGER:-PT1H","END:VALARM",
    "END:VEVENT","END:VCALENDAR"
  ].join("\r\n");
}
function addToCalendar(e){
  try{
    const blob=new Blob([buildICS(e)],{type:"text/calendar;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download=("zberise-"+e.title).replace(/[^a-z0-9]+/gi,"-").toLowerCase()+".ics";
    document.body.appendChild(a); a.click();
    setTimeout(()=>{a.remove();URL.revokeObjectURL(url)},1500);
  }catch(err){toast("Koledarja ni bilo mogoče odpreti")}
}
async function toggleJoin(id){
  const e=events.find(x=>x.id===id); if(!e||!sb) return;
  if(e.parts.includes(me.id)){
    await sb.from("participants").delete().eq("event_id",id).eq("user_id",me.id);
    if(e.waitlist.length && (e.parts.length-1)<e.needed){
      const promoted=e.waitlist[0];
      await sb.from("participants").update({status:"joined"}).eq("event_id",id).eq("user_id",promoted);
      const pu=users.find(u=>u.id===promoted);
      toast((pu?pu.name.split(" ")[0]:"Naslednji")+" premaknjen(a) s čakalne liste ⬆️");
    } else { toast("Odjavljen z dogodka"); }
  } else {
    if(e.parts.length>=e.needed){toast("Ekipa je že polna");return;}
    const {error}=await sb.from("participants").upsert({event_id:id,user_id:me.id,status:"joined"},{onConflict:"event_id,user_id"});
    if(error){ toast("Napaka pri prijavi"); return; }
    addToCalendar(e);   /* takoj doda opomnik v koledar (iOS / Android) */
    toast("Prijavljen! Opomnik dodan v koledar 📅");
  }
  await reloadAndRefresh();
}
async function toggleWait(id){
  const e=events.find(x=>x.id===id); if(!e||!sb) return;
  if(e.waitlist.includes(me.id)){ await sb.from("participants").delete().eq("event_id",id).eq("user_id",me.id); toast("Odstranjen s čakalne liste"); }
  else { await sb.from("participants").upsert({event_id:id,user_id:me.id,status:"waitlist"},{onConflict:"event_id,user_id"}); toast("Na čakalni listi ⏳ — obvestimo te, ko se sprosti mesto"); }
  await reloadAndRefresh();
}

  inp.value=""; chatDrafts[id]="";

async function shareEvent(id){

/* ============ VREME (Open-Meteo, brez ključa; deluje na iOS/Android) ============ */
function coordsFor(loc){const l=(loc||"").toLowerCase();
  for(const k in CITY_COORDS){ if(l.includes(k)) return CITY_COORDS[k]; }
  return CITY_COORDS["ljubljan"];
}
function wxDesc(c){
  if(c===0) return {emoji:"☀️",txt:"Jasno"};
  if(c<=3)  return {emoji:"⛅",txt:"Delno oblačno"};
  if(c<=48) return {emoji:"🌫️",txt:"Megla"};
  if(c<=57) return {emoji:"🌦️",txt:"Rosenje"};
  if(c<=67) return {emoji:"🌧️",txt:"Dež"};
  if(c<=77) return {emoji:"❄️",txt:"Sneg"};
  if(c<=82) return {emoji:"🌦️",txt:"Plohe"};
  if(c<=86) return {emoji:"🌨️",txt:"Snežne plohe"};
  return {emoji:"⛈️",txt:"Nevihta"};
}
async function loadWeather(e){
  const el=document.getElementById("wx-"+e.id); if(!el) return;
  if(INDOOR.has(e.sport)){ el.innerHTML=`<div class="wx"><span class="t">🏟️</span><div><div style="font-weight:700">Notranji šport</div><div class="muted">Vreme ni pomembno</div></div></div>`; return; }
  el.innerHTML=`<div class="wx"><span class="t">⏳</span><div class="muted">Nalagam vremensko napoved ...</div></div>`;
  try{
    const [lat,lon]=coordsFor(e.location);
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,precipitation_probability,weather_code&start_date=${e.date}&end_date=${e.date}&timezone=Europe%2FLjubljana`;
    const r=await fetch(url); if(!r.ok) throw 0; const j=await r.json();
    const hh=pad2(parseInt(e.time.slice(0,2)))+":00";
    let i=j.hourly.time.findIndex(t=>t.endsWith("T"+hh)); if(i<0) i=12;
    const temp=Math.round(j.hourly.temperature_2m[i]);
    const pop=j.hourly.precipitation_probability[i];
    const w=wxDesc(j.hourly.weather_code[i]);
    el.innerHTML=`<div class="wx"><span class="t">${w.emoji}</span><div style="flex:1"><div><span class="temp">${temp}°C</span> · ${w.txt}</div><div class="muted">Možnost padavin ${pop}% · ob ${e.time}</div></div></div>`;
  }catch(err){ el.innerHTML=`<div class="wx"><span class="t">🌡️</span><div class="muted">Vremenska napoved trenutno ni na voljo</div></div>`; }
}

        <select id="eLevel">${LEVELS.map(l=>`<option ${(e.level||'Vsi nivoji')===l?'selected':''}>${l}</option>`).join("")}</select></div>
      <div class="form-group"><label>Opis (neobvezno)</label>
        <textarea id="eNotes" rows="3" placeholder="Tempo, nivo, kaj prinesti ...">${e.notes?esc(e.notes):''}</textarea></div>
    </div>
    <div class="save-bar">
      <button class="btn-primary" style="background:var(--brand);color:#fff;box-shadow:0 6px 16px rgba(42,120,214,.35)" onclick="saveEvent()">
        ${editingId?'Shrani spremembe':'Objavi dogodek'}</button>
    </div>`;
}
function esc(s){return s.replace(/"/g,'&quot;').replace(/</g,'&lt;')}
function pickSportSel(id){pickSport=id;
  document.querySelectorAll("#sportGrid .sport-pick").forEach((b,i)=>b.classList.toggle("active",SPORTS[i].id===id));}
function stepNeed(d){const i=document.getElementById("eNeed");let v=parseInt(i.value)+d;v=Math.max(2,Math.min(30,v));i.value=v;}
async function saveEvent(){
  const title=document.getElementById("eTitle").value.trim();
  const loc=document.getElementById("eLoc").value.trim();
  if(!title) return toast("Vnesi naslov dogodka");
  if(!loc) return toast("Vnesi zbirno mesto");
  if(!sb) return toast("Ni povezave z bazo");
  const row={sport:pickSport,title,location:loc,
    event_date:document.getElementById("eDate").value,event_time:document.getElementById("eTime").value,
    needed:parseInt(document.getElementById("eNeed").value),duration:document.getElementById("eDur").value,
    level:document.getElementById("eLevel").value,
    notes:document.getElementById("eNotes").value.trim()};
  if(editingId){
    const {error}=await sb.from("events").update(row).eq("id",editingId);
    if(error){ toast("Napaka pri shranjevanju"); return; }
    toast("Dogodek posodobljen ✓");
  } else {
    row.host_id=me.id;
    const {data,error}=await sb.from("events").insert(row).select("id").single();
    if(error){ toast("Napaka pri objavi"); return; }
    await sb.from("participants").insert({event_id:data.id,user_id:me.id,status:"joined"});
    toast("Dogodek objavljen! 🎉");
  }
  editingId=null;
  await loadAll();
  go("home");
}
async function deleteEvent(id){
  if(!sb) return;
  const {error}=await sb.from("events").delete().eq("id",id);
  if(error){ toast("Napaka pri brisanju (nimaš pravic?)"); return; }
  closeSheet(); toast("Dogodek izbrisan");
  await loadAll();
  if(currentTab==="admin")renderAdmin();else go("home");
}

/* ===== ADMIN: pošlji uporabniku povezavo za ponastavitev gesla ===== */
async function adminResetPwd(userId){
  const u=users.find(x=>x.id===userId); if(!u||!u.email||!sb) return;
  const {error}=await sb.auth.resetPasswordForEmail(u.email,{redirectTo:location.origin+location.pathname});
  toast(error ? "Napaka pri pošiljanju" : "Povezava za ponastavitev poslana na "+u.email);
}
/* ===== Nastavitev novega gesla (ko uporabnik klikne povezavo iz e-pošte) ===== */
function openSetPassword(){
  document.getElementById("sheetHost").innerHTML=`
   <div class="sheet-back" style="align-items:center">
     <div class="modal">
       <div class="modal-ic">🔑</div>
       <h3>Nastavi novo geslo</h3>
       <p>Vnesi novo geslo za svoj račun.</p>
       <input id="npw" type="password" placeholder="Novo geslo (vsaj 6 znakov)" autocomplete="new-password">
       <div class="modal-btns"><button class="mb-save" style="flex:1" onclick="doSetPassword()">Shrani</button></div>
     </div>
   </div>`;
  setTimeout(()=>{const i=document.getElementById("npw");if(i)i.focus();},60);
}
async function doSetPassword(){
  const v=document.getElementById("npw").value.trim();
  if(v.length<6){ toast("Geslo naj ima vsaj 6 znakov"); return; }
  const {error}=await sb.auth.updateUser({password:v});
  if(error){ toast("Napaka pri shranjevanju gesla"); return; }
  closeSheet(); toast("Geslo posodobljeno ✓");
}

/* ================= ADMIN ================= */
let adminMetric="events"; // events | users
function setMetric(m){adminMetric=m;renderAdmin();}
function scrollToUsers(){const el=document.getElementById("usersPanel");if(el)el.scrollIntoView({behavior:"smooth",block:"start"});}
function renderAdmin(){
  const totalEvents=events.length;
  const totalUsers=users.length;
  const totalSignups=events.reduce((a,e)=>a+e.parts.length,0);

  // aggregate per sport
  const agg={};
  SPORTS.forEach(s=>agg[s.id]={events:0,users:0});
  events.forEach(e=>{agg[e.sport].events++;agg[e.sport].users+=e.parts.length;});
  const rows=SPORTS.map(s=>({s,events:agg[s.id].events,users:agg[s.id].users}))
    .filter(r=>r.events>0)
    .sort((a,b)=>b[adminMetric]-a[adminMetric]);
  const max=Math.max(1,...rows.map(r=>r[adminMetric]));

  // most popular (by events) & most numerous (by users)
  const byEvents=[...rows].sort((a,b)=>b.events-a.events)[0];
  const byUsers=SPORTS.map(s=>({s,users:agg[s.id].users})).sort((a,b)=>b.users-a.users)[0];

  let bars=rows.map(r=>{
    const val=r[adminMetric];const pct=Math.round(val/max*100);
    return `<div class="bar-row">
      <div class="bl"><span class="e">${r.s.emoji}</span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.s.name}</span></div>
      <div class="bar-track"><i style="width:${pct}%;background:${r.s.color}"></i><span class="bar-val">${val}</span></div>
    </div>`;
  }).join("");
  if(!bars) bars=`<div class="empty" style="padding:20px">Ni podatkov.</div>`;

  const adminList=[...events].sort((a,b)=>a.date.localeCompare(b.date)).map(e=>{
    const s=sportById(e.sport);const d=fmtDay(e.date);const full=e.parts.length>=e.needed;
    return `<div class="admin-item">
      <div class="ai-ic" style="background:${s.color}22">${s.emoji}</div>
      <div style="flex:1;min-width:0"><div class="ai-t" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.title}</div>
        <div class="ai-s">${d.label} ${e.time} · ${e.parts.length}/${e.needed} ${full?'· polna':''}</div></div>
      <button class="ai-edit" onclick="openEdit('${e.id}')">Uredi</button>
    </div>`;
  }).join("");

  const usersList=[...users].sort((a,b)=>a.name.localeCompare(b.name)).map(u=>{
    const cnt=events.filter(e=>e.parts.includes(u.id)).length;
    return `<div class="admin-item">
      <div class="av" style="background:${avColor(u.id)};width:38px;height:38px;font-size:14px">${initials(u.name)}</div>
      <div style="flex:1;min-width:0">
        <div class="ai-t" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(u.name)}${u.isAdmin?' <span style="font-size:10px;background:#111;color:#fff;padding:1px 6px;border-radius:6px">ADMIN</span>':''}</div>
        <div class="ai-s" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(u.email)} · ${cnt} prijav</div>
      </div>
      <button class="ai-edit" onclick="adminResetPwd('${u.id}')">🔑 Ponastavi</button>
    </div>`;
  }).join("");

  document.getElementById("screen").innerHTML=`
    <div class="topbar"><div style="flex:1"><h1>Nadzorna plošča</h1>
      <div class="sub">Admin · pregled vseh dejavnosti</div></div>
      <button class="av" style="background:#111;border:none" onclick="scrollToUsers()" title="Uporabniki">👥</button></div>

    <div class="kpi-row">
      <div class="kpi hl"><div class="v">${totalEvents}</div><div class="l">Aktivnih dogodkov</div></div>
      <div class="kpi"><div class="v">${totalUsers}</div><div class="l">Registriranih uporabnikov</div></div>
      <div class="kpi gold"><div class="v">${byEvents?byEvents.s.emoji:''} </div><div class="l">Najbolj priljubljena:<br><b style="font-size:14px">${byEvents?byEvents.s.name:'—'}</b> (${byEvents?plDog(byEvents.events):0})</div></div>
      <div class="kpi"><div class="v">${totalSignups}</div><div class="l">Vseh prijav skupaj</div></div>
    </div>

    <div class="panel">
      <h3>Dejavnosti po ${adminMetric==='events'?'številu dogodkov':'številu udeležencev'}</h3>
      <div class="psub">Katera dejavnost se izvaja največ in katera je najštevilčnejša</div>
      <div class="seg">
        <button class="${adminMetric==='events'?'active':''}" onclick="setMetric('events')">Po dogodkih</button>
        <button class="${adminMetric==='users'?'active':''}" onclick="setMetric('users')">Po udeležencih</button>
      </div>
      ${bars}
      <div style="margin-top:14px;padding:12px 14px;background:var(--brand-soft);border-radius:12px;font-size:13px;color:var(--brand-dark);line-height:1.5">
        <b>${byUsers.s.emoji} ${byUsers.s.name}</b> je najštevilčnejša po uporabnikih — skupaj <b>${byUsers.users}</b> prijavljenih.
      </div>
    </div>

    <div class="panel">
      <h3>Vsi dogodki (${events.length})</h3>
      <div class="psub">Klikni »Uredi« za popravke ali izbris</div>
      ${adminList||'<div class="empty" style="padding:20px">Ni dogodkov.</div>'}
    </div>

    <div class="panel" id="usersPanel">
      <h3>👥 Uporabniki (${users.length})</h3>
      <div class="psub">Vsi registrirani računi in e-pošte · »Geslo« za ponastavitev</div>
      ${usersList}
    </div>
    <div style="height:10px"></div>`;
}

/* ================= PROFILE ================= */
function renderProfile(){
  const mine=events.filter(e=>e.parts.includes(me.id)).length;
  const hosted=events.filter(e=>e.hostId===me.id).length;
  const met=new Set();events.filter(e=>e.parts.includes(me.id)).forEach(e=>e.parts.forEach(p=>{if(p!==me.id)met.add(p)}));
  document.getElementById("screen").innerHTML=`
    <div class="topbar"><h1 style="flex:1">Profil</h1></div>
    <div class="prof-head">
      <div class="av" style="background:${avColor(me.id)}">${initials(me.name)}</div>
      <div class="pn">${me.name}${me.isAdmin?' <span style="font-size:12px;background:#111;color:#fff;padding:2px 8px;border-radius:7px;vertical-align:middle">ADMIN</span>':''}</div>
      <div class="pe">${me.email}</div>
    </div>
    <div class="prof-stats">
      <div class="ps"><div class="v">${mine}</div><div class="l">Prijav</div></div>
      <div class="ps"><div class="v">${hosted}</div><div class="l">Organiziranih</div></div>
      <div class="ps"><div class="v">${met.size}</div><div class="l">Spoznanih</div></div>
    </div>
    <div class="panel">
      <h3>Kako deluje Zberi se</h3>
      <div style="font-size:14px;color:var(--text-secondary);line-height:1.65;margin-top:6px">
        1. Izbereš dejavnost in odpreš dogodek — kdaj, kje, koliko oseb rabiš.<br>
        2. Drugi uporabniki vidijo tvoj termin in se prijavijo.<br>
        3. Ko je ekipa polna, greste skupaj — in spoznaš nove ljudi. 🤝
      </div>
    </div>
    <button class="logout" onclick="logout()">Odjava</button>
    <div style="text-align:center;color:var(--muted);font-size:11.5px;padding:0 0 16px">Zberi se · različica 2.0</div>`;
}

/* ================= TOAST ================= */
let toastT;
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),2200);}

/* ===== Med razvojem: odstrani morebitni star service worker in predpomnilnik ===== */
if("serviceWorker" in navigator){
  navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister())).catch(()=>{});
}
if(window.caches){ caches.keys().then(ks=>ks.forEach(k=>caches.delete(k))).catch(()=>{}); }

/* ===== ZAGON: obnovi sejo iz baze ===== */
async function boot(){
  if(!sb){ authError("Ni povezave z bazo (preveri internet)."); return; }
  try{
    sb.auth.onAuthStateChange((ev)=>{ if(ev==="PASSWORD_RECOVERY") openSetPassword(); });
    const {data:{session}}=await sb.auth.getSession();
    if(session){ await afterLogin(); }
  }catch(e){}
}
boot();
</script>
